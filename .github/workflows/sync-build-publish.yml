name: Sync GrokSearch and publish image

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish even if GrokSearch is unchanged"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-build-publish
  cancel-in-progress: false

jobs:
  sync_build_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update submodule to upstream HEAD
        id: submodule
        run: |
          set -euo pipefail

          git submodule sync --recursive
          git submodule update --init --recursive

          BEFORE_SHA="$(git -C GrokSearch rev-parse HEAD)"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"

          BEFORE_VERSION_LINE="$(grep -E '^version\s*=\s*"' GrokSearch/pyproject.toml | head -n 1 || true)"
          if [ -z "$BEFORE_VERSION_LINE" ]; then
            echo "Failed to read version from GrokSearch/pyproject.toml before update" >&2
            exit 1
          fi
          BEFORE_VERSION="$(echo "$BEFORE_VERSION_LINE" | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')"
          echo "before_version=$BEFORE_VERSION" >> "$GITHUB_OUTPUT"

          git -C GrokSearch fetch --prune origin main
          git -C GrokSearch checkout -f origin/main

          AFTER_SHA="$(git -C GrokSearch rev-parse HEAD)"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"

          if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read version after update
        id: version
        run: |
          set -euo pipefail

          VERSION_LINE="$(grep -E '^version\s*=\s*"' GrokSearch/pyproject.toml | head -n 1 || true)"
          if [ -z "$VERSION_LINE" ]; then
            echo "Failed to read version from GrokSearch/pyproject.toml" >&2
            exit 1
          fi

          VERSION="$(echo "$VERSION_LINE" | sed -E 's/^version\s*=\s*"([^"]+)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.submodule.outputs.before_version }}" = "$VERSION" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image reference
        id: registry
        run: |
          set -euo pipefail

          REPO_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          IMAGE="ghcr.io/${REPO_OWNER}/${REPO_NAME}"
          IMAGE="$(printf '%s' "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to publish
        id: publish
        run: |
          set -euo pipefail

          IMAGE="${{ steps.registry.outputs.image }}"
          SHA_TAG="${IMAGE}:sha-${{ steps.submodule.outputs.after_sha }}"

          if docker manifest inspect "$SHA_TAG" >/dev/null 2>&1; then
            IMAGE_EXISTS="true"
          else
            IMAGE_EXISTS="false"
          fi
          echo "image_exists=$IMAGE_EXISTS" >> "$GITHUB_OUTPUT"

          FORCE_PUBLISH="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_publish }}" = "true" ]; then
            FORCE_PUBLISH="true"
          fi
          echo "force_publish=$FORCE_PUBLISH" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.submodule.outputs.changed }}" = "true" ] || [ "$FORCE_PUBLISH" = "true" ] || [ "$IMAGE_EXISTS" = "false" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build test image (if changed)
        if: steps.publish.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: test
          load: true
          tags: |
            local/grok-search-docker:test-${{ steps.submodule.outputs.after_sha }}
          build-args: |
            GROKSEARCH_VERSION=${{ steps.version.outputs.version }}

      - name: Run tests in container (if changed)
        if: steps.publish.outputs.publish == 'true'
        run: |
          set -euo pipefail
          docker run --rm local/grok-search-docker:test-${{ steps.submodule.outputs.after_sha }}

      - name: Build runtime image for smoke check (if changed)
        if: steps.publish.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: |
            local/grok-search-docker:smoke-${{ steps.submodule.outputs.after_sha }}
          build-args: |
            GROKSEARCH_VERSION=${{ steps.version.outputs.version }}

      - name: Smoke check runtime image (if changed)
        if: steps.publish.outputs.publish == 'true'
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/sh local/grok-search-docker:smoke-${{ steps.submodule.outputs.after_sha }} -lc 'command -v grok-search >/dev/null && python -c "import grok_search.server"'

      - name: Commit submodule bump (before image push)
        if: steps.submodule.outputs.changed == 'true' && steps.publish.outputs.publish == 'true'
        run: |
          set -euo pipefail
          git add GrokSearch .gitmodules
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump GrokSearch to ${{ steps.submodule.outputs.after_sha }} (v${{ steps.version.outputs.version }})"
          git push

      - name: Prepare image tags
        id: tags
        if: steps.publish.outputs.publish == 'true'
        run: |
          set -euo pipefail
          IMAGE="${{ steps.registry.outputs.image }}"
          {
            echo 'tags<<EOF'
            echo "${IMAGE}:latest"
            if [ "${{ steps.version.outputs.version_changed }}" = "true" ] || [ "${{ steps.publish.outputs.image_exists }}" = "false" ] || [ "${{ steps.publish.outputs.force_publish }}" = "true" ]; then
              echo "${IMAGE}:v${{ steps.version.outputs.version }}"
            fi
            echo "${IMAGE}:sha-${{ steps.submodule.outputs.after_sha }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (if changed)
        id: build_push
        if: steps.publish.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.submodule.outputs.after_sha }}
          build-args: |
            GROKSEARCH_VERSION=${{ steps.version.outputs.version }}
