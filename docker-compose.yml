services:
  grok-search:
    image: ${GROK_SEARCH_IMAGE:-ghcr.io/mr-monkeyray/grok-search-docker:latest}
    init: true
    restart: unless-stopped
    ports:
      - "${FASTMCP_PORT:-8000}:${FASTMCP_PORT:-8000}"
    environment:
      FASTMCP_TRANSPORT: ${FASTMCP_TRANSPORT:-streamable-http}
      FASTMCP_HOST: ${FASTMCP_HOST:-0.0.0.0}
      FASTMCP_PORT: ${FASTMCP_PORT:-8000}
      FASTMCP_PATH: ${FASTMCP_PATH:-/mcp}
      FASTMCP_SHOW_BANNER: ${FASTMCP_SHOW_BANNER:-false}
      GROK_API_URL: ${GROK_API_URL:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GROK_MODEL: ${GROK_MODEL:-grok-4-fast}
      TAVILY_ENABLED: ${TAVILY_ENABLED:-true}
      TAVILY_API_URL: ${TAVILY_API_URL:-https://api.tavily.com}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL:-https://api.firecrawl.dev/v2}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      GROK_DEBUG: ${GROK_DEBUG:-false}
      GROK_LOG_LEVEL: ${GROK_LOG_LEVEL:-INFO}
      GROK_LOG_DIR: ${GROK_LOG_DIR:-logs}
      GROK_RETRY_MAX_ATTEMPTS: ${GROK_RETRY_MAX_ATTEMPTS:-3}
      GROK_RETRY_MULTIPLIER: ${GROK_RETRY_MULTIPLIER:-1}
      GROK_RETRY_MAX_WAIT: ${GROK_RETRY_MAX_WAIT:-10}
    healthcheck:
      test: ["CMD", "python", "/app/launcher/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - grok-search-config:/home/app/.config/grok-search

volumes:
  grok-search-config:
